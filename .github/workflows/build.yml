name: Build Flutter .deb

on:
  push:
    branches: [ "main" ]

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: download dependecies
        run: |
          sudo apt-get update
          sudo apt-get install -y appindicator3-0.1 clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux

      - name: Package to .deb
        run: |
          # Use a tool like flutter_build_debian or FPM here to bundle your compiled binary
          dart pub global activate flutter_build_debian
          flutter_build_debian
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-deb
          path: debian/packages/*.deb
